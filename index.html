<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a1a">
<title>RIVEN Restaurant Guide</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg: #111111;
  --card: #1E1E1E;
  --card-hover: #252525;
  --gold: #D4AF6A;
  --gold-dim: rgba(212, 175, 106, 0.15);
  --gold-glow: rgba(212, 175, 106, 0.3);
  --text: #F5F0EB;
  --text-muted: #8A8580;
  --green: #6B8F71;
  --green-bg: rgba(107, 143, 113, 0.12);
  --red: #B85C5C;
  --red-bg: rgba(184, 92, 92, 0.10);
  --radius: 14px;
  --radius-sm: 10px;
  --spring-ease: cubic-bezier(0.175, 0.885, 0.32, 1.1);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  height: 100%;
}

body { position: relative; }

.app {
  position: relative;
  width: 100%;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ---- Main Screen ---- */
.screen-main {
  min-height: 100vh;
  padding: calc(var(--safe-top) + 16px) 16px calc(var(--safe-bottom) + 90px);
  transition: transform 0.35s var(--spring-ease), opacity 0.35s ease;
  will-change: transform, opacity;
}

.screen-main.pushed {
  transform: translateX(-30%);
  opacity: 0.4;
  pointer-events: none;
}

/* ---- Brand Header ---- */
.brand {
  text-align: center;
  padding: 20px 0 8px;
  position: relative;
  overflow: hidden;
}

.brand::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: conic-gradient(
    from 0deg at 50% 50%,
    rgba(212, 175, 106, 0.06) 0deg,
    rgba(17, 17, 17, 0) 60deg,
    rgba(212, 175, 106, 0.04) 120deg,
    rgba(17, 17, 17, 0) 180deg,
    rgba(212, 175, 106, 0.06) 240deg,
    rgba(17, 17, 17, 0) 300deg,
    rgba(212, 175, 106, 0.06) 360deg
  );
  animation: brandGradientSpin 20s linear infinite;
  pointer-events: none;
  z-index: 0;
}

@keyframes brandGradientSpin {
  to { transform: rotate(360deg); }
}

.brand h1 {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 2rem;
  letter-spacing: 0.15em;
  color: var(--gold);
  font-weight: 400;
  position: relative;
  z-index: 1;
}

.brand p {
  font-size: 0.8rem;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 2px;
  position: relative;
  z-index: 1;
}

.brand .tagline {
  font-size: 0.95rem;
  color: var(--gold);
  opacity: 0.85;
  text-transform: none;
  letter-spacing: 0.01em;
  margin-top: 8px;
  font-style: italic;
}

/* ---- Search ---- */
.search-wrap {
  position: relative;
  margin: 20px 0 14px;
}

.search-wrap svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  width: 18px;
  height: 18px;
  pointer-events: none;
}

.search-input {
  width: 100%;
  padding: 14px 14px 14px 42px;
  background: var(--card);
  border: 1px solid transparent;
  border-radius: var(--radius);
  color: var(--text);
  font-size: 0.95rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}

.search-input::placeholder { color: var(--text-muted); }
.search-input:focus { border-color: var(--gold); }

/* ---- Help Me Decide Card ---- */
.decide-card {
  background: var(--card);
  border: 1px solid rgba(212, 175, 106, 0.25);
  border-radius: var(--radius);
  padding: 20px;
  margin: 0 0 16px;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  user-select: none;
  animation: cardFloat 4s ease-in-out infinite;
}

.decide-card:active {
  animation: none;
  transform: scale(0.98);
  background: var(--card-hover);
}

@keyframes cardFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}

.decide-card-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}

.decide-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: var(--gold-dim);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.decide-icon svg {
  width: 22px;
  height: 22px;
  color: var(--gold);
}

.decide-card-top h2 {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
}

.decide-card p {
  font-size: 0.82rem;
  color: var(--text-muted);
  line-height: 1.45;
}

.decide-card .decide-arrow {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 12px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--gold);
}

.decide-card .decide-arrow svg {
  width: 16px;
  height: 16px;
}

/* ---- Quick Filter Pills ---- */
.quick-filters {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 4px 0 18px;
  margin-top: 4px;
}

.qf-pill {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 16px;
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 40px;
  color: var(--text);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.3s;
  user-select: none;
  position: relative;
  overflow: hidden;
}
.qf-pill::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 40px;
  opacity: 0;
  box-shadow: 0 0 20px var(--gold-glow), inset 0 0 20px rgba(212, 175, 106, 0.08);
  transition: opacity 0.3s ease;
  pointer-events: none;
}
.qf-pill:active {
  transform: scale(0.95);
  background: var(--card-hover);
  border-color: var(--gold);
}
.qf-pill:active::after { opacity: 1; }
.qf-pill .qf-icon { font-size: 1rem; line-height: 1; }
.pill-ripple {
  position: absolute;
  border-radius: 50%;
  background: var(--gold-glow);
  width: 10px; height: 10px;
  margin-left: -5px; margin-top: -5px;
  transform: scale(0);
  animation: pillRipple 0.5s ease forwards;
  pointer-events: none;
}
@keyframes pillRipple {
  to { transform: scale(6); opacity: 0; }
}

/* ---- Browse Restaurants Overlay (I Know My Spot) ---- */
.screen-browse {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: var(--bg);
  z-index: 90;
  transform: translateY(100%);
  transition: transform 0.4s var(--spring-ease);
  will-change: transform;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: flex;
  flex-direction: column;
}
.screen-browse.active { transform: translateY(0); }

.browse-header {
  padding: calc(var(--safe-top) + 14px) 16px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.browse-close {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--card);
  border: none;
  color: var(--text);
  cursor: pointer;
}
.browse-close:active { background: var(--card-hover); }
.browse-close svg { width: 20px; height: 20px; }

.browse-header-text {
  font-size: 0.78rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
}

.browse-body {
  flex: 1;
  padding: 0 16px calc(var(--safe-bottom) + 20px);
}

.browse-search-wrap {
  position: relative;
  margin: 4px 0 16px;
}
.browse-search-wrap svg {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  width: 18px; height: 18px;
  pointer-events: none;
}
.browse-search {
  width: 100%;
  padding: 14px 14px 14px 42px;
  background: var(--card);
  border: 1px solid transparent;
  border-radius: var(--radius);
  color: var(--text);
  font-size: 0.95rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
.browse-search::placeholder { color: var(--text-muted); }
.browse-search:focus { border-color: var(--gold); }

.browse-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

/* ---- Kid Order Row (With Kids mode) ---- */
.kid-order-row {
  background: rgba(139, 92, 246, 0.08);
  border: 1px solid rgba(139, 92, 246, 0.18);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-top: 12px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.kid-order-row .kid-icon { font-size: 1.1rem; flex-shrink: 0; line-height: 1.3; }
.kid-order-row .kid-text { flex: 1; }
.kid-order-row .kid-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: rgba(167, 139, 250, 0.9); margin-bottom: 3px; }
.kid-order-row .kid-order-name { font-size: 0.88rem; font-weight: 600; color: var(--text); }

/* ---- Location Bar ---- */
.location-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--card);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  margin-top: 2px;
}
.location-bar .loc-icon { font-size: 0.95rem; line-height: 1; }
.location-bar .loc-city {
  flex: 1;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
}
.location-bar .loc-sub {
  font-weight: 400;
  color: var(--text-muted);
}
.location-bar .loc-change {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--gold);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  transition: background 0.15s;
}
.location-bar .loc-change:active {
  background: rgba(212, 175, 106, 0.1);
}

/* ---- Price Badge (Quick & Cheap mode) ---- */
.price-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  background: rgba(34, 197, 94, 0.1);
  color: var(--green);
  font-size: 0.78rem;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-left: 6px;
}

.result-badges {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 4px;
}

/* ---- Restaurant Grid ---- */
.section-label {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px 16px;
  cursor: pointer;
  transition: background 0.15s, transform 0.15s;
  display: flex;
  flex-direction: column;
  gap: 6px;
  border: 1px solid transparent;
  user-select: none;
}

.card:active {
  transform: scale(0.97);
  background: var(--card-hover);
}

.card-emoji { font-size: 1.6rem; line-height: 1; }
.card-name { font-size: 0.95rem; font-weight: 600; color: var(--text); line-height: 1.2; }
.card-category { font-size: 0.75rem; color: var(--text-muted); font-weight: 500; }

.no-results {
  grid-column: 1 / -1;
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
  font-size: 0.9rem;
}

/* ---- Detail Screen ---- */
.screen-detail {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: var(--bg);
  z-index: 100;
  transform: translateX(100%);
  transition: transform 0.35s var(--spring-ease);
  will-change: transform;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 0 calc(var(--safe-bottom) + 90px);
}

.screen-detail.active { transform: translateX(0); }

.detail-header {
  position: sticky;
  top: 0; z-index: 10;
  background: rgba(17, 17, 17, 0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  padding: calc(var(--safe-top) + 12px) 16px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.back-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--card);
  border: none;
  color: var(--text);
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s;
}

.back-btn:active { background: var(--card-hover); }
.back-btn svg { width: 20px; height: 20px; }

.detail-title-area { flex: 1; min-width: 0; }
.detail-title { font-size: 1.15rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.detail-category { font-size: 0.75rem; color: var(--text-muted); }
.detail-body { padding: 20px 16px; }

/* ---- Order / Skip Sections ---- */
.section-heading {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}

.section-heading .dot { width: 8px; height: 8px; border-radius: 50%; }
.section-heading .dot.green { background: var(--green); }
.section-heading .dot.red { background: var(--red); }
.section-heading h2 { font-size: 1rem; font-weight: 700; letter-spacing: 0.02em; }

.order-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}

.order-card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 6px;
}

.order-item-name { font-size: 0.95rem; font-weight: 600; }

.protein-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  background: var(--gold-dim);
  color: var(--gold);
  font-size: 0.78rem;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}

.order-desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.45; margin-bottom: 10px; }

.coach-tip {
  background: var(--green-bg);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  display: flex;
  gap: 8px;
  align-items: flex-start;
}

.coach-tip svg { width: 16px; height: 16px; color: var(--green); flex-shrink: 0; margin-top: 1px; }
.coach-tip p { font-size: 0.8rem; color: var(--green); line-height: 1.45; }

.skip-section { margin-top: 28px; }

.skip-card {
  background: var(--red-bg);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

.skip-card .x-icon { color: var(--red); font-weight: 700; font-size: 0.85rem; flex-shrink: 0; margin-top: 1px; }
.skip-card .skip-text { flex: 1; }
.skip-card .skip-name { font-size: 0.88rem; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.skip-card .skip-reason { font-size: 0.78rem; color: var(--text-muted); line-height: 1.4; }

/* ---- Decision Flow (Full Screen) ---- */
.screen-decide {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: var(--bg);
  z-index: 150;
  transform: translateY(100%);
  transition: transform 0.4s var(--spring-ease);
  will-change: transform;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: flex;
  flex-direction: column;
}

.screen-decide.active { transform: translateY(0); }

.decide-header {
  padding: calc(var(--safe-top) + 14px) 16px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.decide-close {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--card);
  border: none;
  color: var(--text);
  cursor: pointer;
}

.decide-close:active { background: var(--card-hover); }
.decide-close svg { width: 20px; height: 20px; }

.decide-header-text {
  font-size: 0.78rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
}

/* Progress dots */
.progress-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 8px 16px 0;
  flex-shrink: 0;
}

.progress-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  transition: background 0.3s, width 0.3s;
}

.progress-dot.active {
  background: var(--gold);
  width: 24px;
  border-radius: 4px;
}

.progress-dot.done { background: var(--gold); }

/* Step content */
.decide-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 24px 20px calc(var(--safe-bottom) + 24px);
}

.step-question {
  font-size: 1.5rem;
  font-weight: 700;
  text-align: center;
  line-height: 1.3;
  margin-bottom: 6px;
}

.step-subtitle {
  font-size: 0.85rem;
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 28px;
}

.step-options {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  max-width: 400px;
  margin: 0 auto;
  width: 100%;
}

.step-option {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 22px 12px;
  background: var(--card);
  border: 1.5px solid rgba(255,255,255,0.06);
  border-radius: var(--radius);
  color: var(--text);
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}

.step-option:active { transform: scale(0.96); }

.step-option .opt-emoji {
  font-size: 1.8rem;
  line-height: 1;
}

.step-option .opt-label {
  font-size: 0.88rem;
  font-weight: 600;
}

.step-option .opt-sub {
  font-size: 0.72rem;
  color: var(--text-muted);
  font-weight: 400;
}

/* Time options are single column */
.step-options.single-col {
  grid-template-columns: 1fr;
  max-width: 320px;
}

.step-options.single-col .step-option {
  flex-direction: row;
  gap: 12px;
  padding: 18px 20px;
  text-align: left;
}

.step-options.single-col .opt-emoji {
  font-size: 1.4rem;
  flex-shrink: 0;
}

.step-options.single-col .opt-text {
  display: flex;
  flex-direction: column;
}

/* ---- Quick Pick Result Screen ---- */
.result-wrap {
  text-align: center;
  max-width: 400px;
  margin: 0 auto;
  width: 100%;
}

.result-label {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-bottom: 8px;
  font-weight: 600;
}

.result-restaurant {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 1.8rem;
  color: var(--gold);
  margin-bottom: 2px;
}

.result-category {
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-bottom: 24px;
}

.result-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  text-align: left;
  margin-bottom: 20px;
}

.result-card .order-item-name { margin-bottom: 6px; font-size: 1.05rem; }
.result-card .protein-badge { margin-bottom: 12px; display: inline-flex; }
.result-card .order-desc { margin-bottom: 12px; }

.result-done-btn {
  width: 100%;
  padding: 16px;
  background: var(--gold);
  color: #111;
  border: none;
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;

// Find restaurants matching the decision flow
function findMatches(mealType, time, vibe) {
  return restaurants.filter(r =>
    isAvailable(r) &&
    r.mealType.includes(mealType) &&
    r.vibe === vibe
  ).sort((a, b) => {
    // Prefer time match
    if (a.time === time && b.time !== time) return -1;
    if (b.time === time && a.time !== time) return 1;
    // Then by highest protein in first order item
    const aP = parseInt(a.order[0].protein);
    const bP = parseInt(b.order[0].protein);
    return bP - aP;
  });
}

// Fallback: broaden search if no exact vibe match
function findMatchesBroad(mealType, time) {
  return restaurants.filter(r =>
    isAvailable(r) &&
    r.mealType.includes(mealType)
  ).sort((a, b) => {
    if (a.time === time && b.time !== time) return -1;
    if (b.time === time && a.time !== time) return 1;
    const aP = parseInt(a.order[0].protein);
    const bP = parseInt(b.order[0].protein);
    return bP - aP;
  });
}

// RIPPLE EFFECT
// ============================================================
function createRipple(element, event) {
  const existing = element.querySelector('.pill-ripple');
  if (existing) existing.remove();
  const ripple = document.createElement('span');
  ripple.classList.add('pill-ripple');
  const rect = element.getBoundingClientRect();
  const x = (event.touches ? event.touches[0].clientX : event.clientX) - rect.left;
  const y = (event.touches ? event.touches[0].clientY : event.clientY) - rect.top;
  ripple.style.left = x + 'px';
  ripple.style.top = y + 'px';
  element.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());
}

// Attach ripple to pills, option buttons, decide card
document.addEventListener('touchstart', (e) => {
  const pill = e.target.closest('.qf-pill');
  if (pill) { createRipple(pill, e); return; }
  const opt = e.target.closest('.step-option');
  if (opt) { createRipple(opt, e); return; }
}, { passive: true });

// ============================================================
// SWIPE CARD ENGINE
// ============================================================
function initSwipeCard(containerEl, { onSwipeLeft, onSwipeRight }) {
  const card = containerEl.querySelector('.swipe-card');
  if (!card) return;
  let startX = 0, startY = 0, deltaX = 0, isDragging = false, isHorizontal = null;

  card.addEventListener('touchstart', (e) => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    deltaX = 0;
    isDragging = true;
    isHorizontal = null;
    card.classList.add('dragging');
  }, { passive: true });

  card.addEventListener('touchmove', (e) => {
    if (!isDragging) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    // Determine swipe direction on first significant movement
    if (isHorizontal === null && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
      isHorizontal = Math.abs(dx) > Math.abs(dy) * 1.3;
    }
    if (!isHorizontal) return; // let vertical scroll happen
    e.preventDefault();
    deltaX = dx;
    const rotation = deltaX * 0.04;
    const opacity = Math.max(0.5, 1 - Math.abs(deltaX) / 300);
    card.style.transform = `translateX(${deltaX}px) rotate(${rotation}deg)`;
    card.style.opacity = opacity;
  }, { passive: false });

  card.addEventListener('touchend', () => {
    if (!isDragging) return;
    isDragging = false;
    card.classList.remove('dragging');
    if (isHorizontal && Math.abs(deltaX) > 80) {
      // Threshold met — animate off screen
      if (deltaX < 0) {
        card.classList.add('exit-left');
        setTimeout(() => onSwipeLeft(), 280);
      } else {
        card.classList.add('exit-right');
        setTimeout(() => onSwipeRight(), 280);
      }
    } else {
      // Snap back
      card.style.transform = '';
      card.style.opacity = '';
    }
  });
}

function renderSwipeCounter(current, total) {
  let dots = '';
  for (let i = 0; i < total; i++) {
    dots += `<div class="s-dot${i === current ? ' active' : ''}"></div>`;
  }
  return `
    <div class="swipe-counter">${current + 1} of ${total}</div>
    <div class="swipe-dots">${dots}</div>
    <div class="swipe-hint">← swipe left for next · swipe right to pick →</div>`;
}

  if (option && dStep >= 1 && dStep <= 3) {
    const val = option.dataset.value;
    if (dStep === 1) { dMealType = val; dStep = 2; }
    else if (dStep === 2) { dTime = val; dStep = 3; }
    else if (dStep === 3) { dVibe = val; dStep = 4; }
    renderDecideStep();
    return;
  }

  if (e.target.id === 'resultDone') {
    closeDecide();
    return;
  }

  if (e.target.id === 'resultRetry') {
    if (qfMode) {
      closeDecide();
    } else {
      dStep = 1;
      dMealType = "";
      dTime = "";
      dVibe = "";
      dPickIndex = 0;
      renderDecideStep();
    }
    return;
  }

  // Alt card tap → open that restaurant detail
  const altCard = e.target.closest('.alt-card');
  if (altCard) {
    closeDecide();
    setTimeout(() => openDetail(altCard.dataset.id), 350);
  }
});

decideCard.addEventListener('click', openDecide);
decideClose.addEventListener('click', closeDecide);

// ============================================================
// QUICK FILTER MODES
// ============================================================
const qfModeLabels = {
  drivethru: '🚗 Drive-Thru Mode',
  datenight: '💃 Date Night Mode',
  withkids: '👶 Eating with Kids',
  breakfast: '🌅 Breakfast Mode',
  cheapprotein: '💰 Quick & Cheap'
};

function getQuickFilterMatches(mode) {
  let results = [];
  if (mode === 'drivethru') {
    results = restaurants.filter(r => isAvailable(r) && r.driveThru === true);
  } else if (mode === 'datenight') {
    results = restaurants.filter(r => isAvailable(r) && r.dateNight === true);
  } else if (mode === 'withkids') {
    results = restaurants.filter(r => isAvailable(r) && r.kidFriendly === true);
  } else if (mode === 'breakfast') {
    results = restaurants.filter(r => isAvailable(r) && r.mealType.includes('breakfast'));
  } else if (mode === 'cheapprotein') {
    results = restaurants.filter(r => isAvailable(r) && getBestCheapItem(r) !== null);
  }
  // Sort by highest protein of first order item
  results.sort((a, b) => {
    const aP = parseInt(a.order[0].protein);
    const bP = parseInt(b.order[0].protein);
    return bP - aP;
  });
  return results;
}

function getBestCheapItem(restaurant) {
  // Find the highest-protein order item that's ≤ $10 and ≥ 30g protein
  let best = null;
  for (const item of restaurant.order) {
    if (item.price && item.price <= 10) {
      const p = parseInt(item.protein);
      if (p >= 30) {
        if (!best || p > parseInt(best.protein)) best = item;
      }
    }
  }
  return best;
}

function openQuickFilter(mode) {
  qfMode = mode;
  qfMatches = getQuickFilterMatches(mode);
  qfPickIndex = 0;

  // Update header
  document.querySelector('.decide-header-text').textContent = qfModeLabels[mode] || 'Quick Filter';

  // Hide progress dots
  progressDots.innerHTML = '';

  // Open overlay
  screenDecide.classList.add('active');
  document.body.style.overflow = 'hidden';

  renderQuickFilterResult();
}

function renderQuickFilterResult() {
  if (qfMatches.length === 0) {
    decideBody.innerHTML = `
      <div class="result-wrap">
        <div class="result-label">No Matches</div>
        <p style="color:var(--text-muted);text-align:center;margin-top:20px;">No restaurants match this filter right now.</p>
        <button class="result-done-btn" id="resultDone" style="margin-top:24px;">Close</button>
      </div>`;
    return;
  }

  if (qfPickIndex >= qfMatches.length) qfPickIndex = 0;

  const pick = qfMatches[qfPickIndex];
  const hasMore = qfMatches.length > 1;

  // For cheapprotein mode, use the best cheap item; otherwise use first order item
  let item, showPriceBadge = false;
  if (qfMode === 'cheapprotein') {
    item = getBestCheapItem(pick);
    if (!item) item = pick.order[0]; // fallback
    showPriceBadge = true;
  } else {
    item = pick.order[0];
  }

  // Kid order row for withkids mode
  let kidOrderHtml = '';
  if (qfMode === 'withkids' && item.kidOrder) {
    kidOrderHtml = `
      <div class="kid-order-row">
        <span class="kid-icon">🧒</span>
        <div class="kid-text">
          <div class="kid-label">For the Kids</div>
          <div class="kid-order-name">${item.kidOrder}</div>
        </div>
      </div>`;
  }

  // Badge row
  let badgeHtml = `<div class="protein-badge">${item.protein} protein</div>`;
  if (showPriceBadge && item.price) {
    badgeHtml = `<div class="result-badges">
      <div class="protein-badge">${item.protein} protein</div>
      <div class="price-badge">$${item.price.toFixed(2)}</div>
    </div>`;
  }

  decideBody.innerHTML = `
    <div class="result-wrap">
      <div class="result-label">Your RIVEN Pick</div>
      <div class="swipe-card-container" id="qfSwipeContainer">
        <div class="swipe-card enter-from-right">
          <div class="result-restaurant">${pick.emoji} ${pick.name}</div>
          <div class="result-category">${pick.category}</div>
          <div class="result-card">
            <div class="order-item-name">${item.name}</div>
            ${badgeHtml}
            <div class="order-desc">${item.desc}</div>
            <div class="coach-tip">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.376 3.622a1 1 0 0 1 3.002 3.002L7.368 18.635a2 2 0 0 1-.855.506l-2.872.838a.5.5 0 0 1-.62-.62l.838-2.872a2 2 0 0 1 .506-.854z"/></svg>
              <p>${item.tip}</p>
            </div>
            ${kidOrderHtml}
          </div>
        </div>
      </div>
      ${hasMore ? renderSwipeCounter(qfPickIndex, qfMatches.length) : ''}
      <button class="result-done-btn" id="resultDone">Got It</button>
      <button class="result-alt-btn" id="resultRetry" style="text-decoration:none;color:var(--text-muted);opacity:0.7;">Close</button>
    </div>`;

  // Init swipe if multiple options
  if (hasMore) {
    const container = document.getElementById('qfSwipeContainer');
    initSwipeCard(container, {
      onSwipeLeft: () => { qfPickIndex++; renderQuickFilterResult(); },
      onSwipeRight: () => { closeDecide(); }
    });
  }
  screenDecide.scrollTo(0, 0);
}

// ============================================================
// BROWSE RESTAURANTS OVERLAY ("I Know My Spot")
// ============================================================
function renderBrowseGrid(filter = "") {
  const lowerFilter = filter.toLowerCase().trim();
  const filtered = restaurants.filter(r =>
    isAvailable(r) &&
    (r.name.toLowerCase().includes(lowerFilter) ||
    r.category.toLowerCase().includes(lowerFilter))
  );

  if (filtered.length === 0) {
    browseGrid.innerHTML = '<div class="no-results">No restaurants found. Try a different search.</div>';
    return;
  }

  browseGrid.innerHTML = filtered.map(r => `
    <div class="card" data-id="${r.id}" role="button" tabindex="0">
      <div class="card-emoji">${r.emoji}</div>
      <div class="card-name">${r.name}</div>
      <div class="card-category">${r.category}</div>
    </div>
  `).join('');
}

function openBrowse() {
  browseOverlayOpen = true;
  browseSearch.value = '';
  renderBrowseGrid();
  screenBrowse.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeBrowse() {
  browseOverlayOpen = false;
  screenBrowse.classList.remove('active');
  document.body.style.overflow = '';
}

browseSearch.addEventListener('input', (e) => renderBrowseGrid(e.target.value));

browseGrid.addEventListener('click', (e) => {
  const card = e.target.closest('.card');
  if (card) openDetail(card.dataset.id);
});

browseClose.addEventListener('click', closeBrowse);
document.getElementById('knowMySpotBtn').addEventListener('click', openBrowse);

// Quick filter pill clicks
document.getElementById('quickFilters').addEventListener('click', (e) => {
  const pill = e.target.closest('.qf-pill');
  if (pill && pill.dataset.mode) openQuickFilter(pill.dataset.mode);
});

// ============================================================
// "I ATE BAD" RECOVERY FEATURE
// ============================================================
const screenIateBad = document.getElementById('screenIateBad');
const iateBadBody = document.getElementById('iateBadBody');
let iateBadPath = null;
let iateBadCardIndex = 0;

function openIateBad() {
  iateBadPath = null;
  iateBadCardIndex = 0;
  screenIateBad.classList.add('active');
  document.body.style.overflow = 'hidden';
  renderIateBadHug();
}

function closeIateBad() {
  screenIateBad.classList.remove('active');
  document.body.style.overflow = '';
  iateBadPath = null;
  iateBadCardIndex = 0;
}

function renderIateBadHug() {
  const quote = recoveryQuotes[Math.floor(Math.random() * recoveryQuotes.length)];
  iateBadBody.innerHTML = `
    <div class="iatebad-hug">
      <div class="hug-glow-bg"></div>
      <div class="hug-quote">${quote}</div>
      <div class="hug-sub">You're here. That's what matters.</div>
      <div class="iatebad-paths">
        <button class="iatebad-path-btn" data-path="fastfood">
          <span class="path-emoji">🚗</span>
          <div class="path-info">
            <div class="path-label">Fast Food Recovery</div>
            <div class="path-sub">Grab something smart nearby</div>
          </div>
        </button>
        <button class="iatebad-path-btn" data-path="homemeal">
          <span class="path-emoji">🏠</span>
          <div class="path-info">
            <div class="path-label">Home Meal</div>
            <div class="path-sub">Quick protein at home</div>
          </div>
        </button>
        <button class="iatebad-path-btn" data-path="shake">
          <span class="path-emoji">🥤</span>
          <div class="path-info">
            <div class="path-label">Grab a Shake</div>
            <div class="path-sub">Easiest possible protein</div>
          </div>
        </button>
      </div>
    </div>`;
}

function renderIateBadCards() {
  const items = recoveryPaths[iateBadPath];
  if (!items || items.length === 0) return;
  if (iateBadCardIndex >= items.length) iateBadCardIndex = 0;

  const item = items[iateBadCardIndex];
  const coachLine = recoveryCoachLines[Math.floor(Math.random() * recoveryCoachLines.length)];
  const pathLabel = iateBadPath === 'fastfood' ? '🚗 Fast Food' : iateBadPath === 'homemeal' ? '🏠 Home Meal' : '🥤 Shake';

  iateBadBody.innerHTML = `
    <div class="iatebad-cards-view">
      <div class="iatebad-coach-line">"${coachLine}"</div>
      <div class="result-label" style="margin-bottom:12px;">${pathLabel} Recovery</div>
      <div class="swipe-card-container" id="iateBadSwipeContainer">
        <div class="swipe-card enter-from-right">
          <div class="result-card">
            <div class="order-item-name">${item.name}</div>
            <div class="protein-badge">${item.protein} protein</div>
            <div class="order-desc">${item.desc}</div>
            <div class="coach-tip">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.376 3.622a1 1 0 0 1 3.002 3.002L7.368 18.635a2 2 0 0 1-.855.506l-2.872.838a.5.5 0 0 1-.62-.62l.838-2.872a2 2 0 0 1 .506-.854z"/></svg>
              <p>${item.tip}</p>
            </div>
          </div>
        </div>
      </div>
      ${renderSwipeCounter(iateBadCardIndex, items.length)}
      <button class="result-done-btn" id="iateBadGotIt">Got It</button>
      <button class="iatebad-back-link" id="iateBadBackPaths">← Back to Paths</button>
    </div>`;

  // Init swipe
  const container = document.getElementById('iateBadSwipeContainer');
  initSwipeCard(container, {
    onSwipeLeft: () => { iateBadCardIndex++; renderIateBadCards(); },
    onSwipeRight: () => { closeIateBad(); }
  });
}

// Event delegation for I Ate Bad overlay
iateBadBody.addEventListener('click', (e) => {
  const pathBtn = e.target.closest('.iatebad-path-btn');
  if (pathBtn) {
    iateBadPath = pathBtn.dataset.path;
    iateBadCardIndex = 0;
    renderIateBadCards();
    return;
  }
  if (e.target.id === 'iateBadGotIt') {
    closeIateBad();
    return;
  }
  if (e.target.id === 'iateBadBackPaths') {
    iateBadPath = null;
    iateBadCardIndex = 0;
    renderIateBadHug();
    return;
  }
});

document.getElementById('iateBadBtn').addEventListener('click', openIateBad);
document.getElementById('iateBadClose').addEventListener('click', closeIateBad);

// IP GEOLOCATION — auto-detect Montgomery, AL
// ============================================================
(async function detectLocation() {
  try {
    const res = await fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(4000) });
    if (!res.ok) return;
    const data = await res.json();
    if (data.city && data.city.toLowerCase().includes('montgomery') &&
        data.region && data.region.toLowerCase() === 'alabama') {
      userLocation = "montgomery";
      updateLocationUI();
    }
  } catch (e) {
    // Silently fail — default "anywhere" is safe
  }
})();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
